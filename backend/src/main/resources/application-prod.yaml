spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: uss
    show-sql: false

app:
  server-id: ${SERVER_ID:1}

logging:
  level:
    root: INFO
    com.urlshortener.backend: INFO